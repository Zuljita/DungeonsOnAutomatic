<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DOA Quick GUI</title>
  <style>
    body { font-family: monospace; padding: 1rem; }
    label { margin-right: 0.5rem; }
    #map { border: 1px solid #ccc; padding: 0.5rem; margin-top: 1rem; display: inline-block; }
    #room-key { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Dungeon Generator</h1>
  <div>
    <label>Rooms: <input id="rooms" type="number" value="8" min="1" /></label>
    <label>Seed: <input id="seed" type="text" /></label>
    <label>System:
      <select id="system">
        <option value="generic">generic</option>
        <option value="dfrpg">dfrpg</option>
      </select>
    </label>
    <button id="generate">Generate</button>
    <a id="download-foundry" download="dungeon.json" style="margin-left: 1rem">Download Foundry JSON</a>
  </div>
  <div id="map"></div>
  <h2>Room Key</h2>
  <div id="room-key"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
